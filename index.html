<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>産科臨床シミュレーター Web Pro v2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.92);
            --danger: #cc0000;
            --info: #0066cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #222;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            image-rendering: -webkit-optimize-contrast; /* ぼやけ防止 */
            transition: background-image 0.4s ease;
        }

        /* 画面レイアウト */
        #game-ui {
            position: absolute;
            top: 50px;
            left: 800px;
            right: 60px;
            bottom: 40px;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        #header-area {
            font-size: 48px;
            font-weight: 700;
            color: #000;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        #soa-panel {
            background: var(--glass);
            border-radius: 12px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            gap: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        .soa-col { flex: 1; display: flex; flex-direction: column; }
        .soa-title { font-size: 36px; font-weight: 700; margin-bottom: 5px; color: #000; border-left: 8px solid #333; padding-left: 12px; }
        .soa-content { font-size: 32px; line-height: 1.35; white-space: pre-wrap; color: #111; margin-bottom: 15px; }

        /* Lab表示 */
        .lab-box {
            margin-top: 10px;
            padding: 15px;
            border: 2px solid #666;
            border-radius: 8px;
            background: rgba(255,255,255,0.7);
            font-size: 28px;
        }
        .lab-header { color: #666; font-size: 24px; border-bottom: 1px solid #ccc; margin-bottom: 8px; }
        .lab-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .lab-warn { color: var(--danger); font-weight: 700; }

        /* 操作エリア */
        #action-area {
            display: flex;
            gap: 20px;
            height: 280px;
        }

        #btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 320px);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px 20px;
        }

        .btn {
            background: white;
            border: 3px solid #333;
            border-radius: 12px;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        .btn.selected { background: #222; color: white; border-color: #fff; }

        #confirm-btn {
            width: 140px;
            background: #cc0000;
            color: white;
            border: 3px solid white;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 700;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 6px;
        }

        /* メニュー */
        #menu-screen {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            z-index: 100;
        }
        .mode-card { background: white; padding: 40px; border-radius: 20px; width: 450px; text-align: center; border: 5px solid #333; }
        .mode-card h2 { font-size: 42px; margin-bottom: 10px; }
        .mode-card p { font-size: 22px; margin-bottom: 30px; color: #666; }

        /* Outcome */
        #outcome-screen, #delivery-screen {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.95);
            display: none;
            padding: 60px;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- メニュー -->
        <div id="menu-screen">
            <div class="mode-card">
                <h2>一般産科医院</h2>
                <p>ローリスク中心<br>難易度: ★★☆☆☆</p>
                <button class="btn" style="width:100%; height:80px;" onclick="initGame('Standard')">勤務開始</button>
            </div>
            <div class="mode-card" style="border-color: #cc0000;">
                <h2 style="color:#cc0000;">高度医療センター</h2>
                <p>ハイリスク妊娠が集約<br>難易度: ★★★★★</p>
                <button class="btn" style="width:100%; height:80px; background:#cc0000; color:white;" onclick="initGame('High-Risk')">勤務開始</button>
            </div>
        </div>

        <!-- メインUI -->
        <div id="game-ui">
            <div id="header-area"></div>
            <div id="soa-panel">
                <div class="soa-col">
                    <div class="soa-title">S：</div>
                    <div id="s-text" class="soa-content"></div>
                    <div class="soa-title">O：</div>
                    <div id="o-text" class="soa-content"></div>
                    <div id="lab-area"></div>
                </div>
                <div class="soa-col">
                    <div class="soa-title">A：</div>
                    <div id="a-text" class="soa-content"></div>
                </div>
            </div>
            <div id="action-area">
                <div id="btn-grid"></div>
                <button id="confirm-btn" onclick="nextWeek()">決定<br>次へ</button>
            </div>
        </div>

        <!-- 結果画面 -->
        <div id="delivery-screen">
            <h1 style="font-size:80px; text-align:center; margin-bottom:20px;">分娩方針の選択</h1>
            <h2 id="del-reason-title" style="font-size:40px; text-align:center; color:#cc0000; margin-bottom:50px;"></h2>
            <div style="display:flex; flex-wrap:wrap; gap:30px; justify-content:center; max-width: 1000px; margin: 0 auto;">
                <button class="btn" style="width:400px; height:100px;" onclick="executeDelivery(1)">経膣分娩試行</button>
                <button class="btn" style="width:400px; height:100px;" onclick="executeDelivery(2)">分娩誘発</button>
                <button class="btn" style="width:400px; height:100px;" onclick="executeDelivery(3)">予定帝王切開</button>
                <button class="btn" style="width:400px; height:100px;" onclick="executeDelivery(4)">緊急帝王切開</button>
                <button class="btn" style="width:830px; height:100px; border-color:#cc0000; color:#cc0000;" onclick="executeDelivery(5)">超緊急帝王切開</button>
            </div>
        </div>

        <div id="outcome-screen">
            <h1 id="outcome-title" style="font-size:80px; text-align:center; margin-bottom:40px;">分娩要約</h1>
            <div style="display:flex; gap:40px; flex-grow:1;">
                <div class="soa-panel" style="flex:1; background:#f9f9f9; padding:30px; border-radius:15px; border:1px solid #ddd;">
                    <div class="soa-title">分娩結果</div>
                    <div id="outcome-desc" class="soa-content" style="font-size:40px;"></div>
                </div>
                <div class="soa-panel" style="flex:1; background:#f9f9f9; padding:30px; border-radius:15px; border:1px solid #ddd;">
                    <div class="soa-title">臨床評価</div>
                    <div id="outcome-audit" style="font-size:30px; line-height:1.6;"></div>
                </div>
            </div>
            <button class="btn" style="width:400px; height:100px; margin:40px auto 0;" onclick="location.reload()">次の症例へ</button>
        </div>
    </div>

    <script>
        // --- データ定義 ---
        const EFW_DATA = {
            18: 200, 20: 300, 22: 450, 24: 650, 26: 900, 28: 1200, 30: 1500, 32: 1850, 34: 2200, 36: 2550, 38: 2900, 40: 3200, 42: 3450
        };
        const getEfw = (w) => {
            const keys = Object.keys(EFW_DATA).map(Number).sort((a,b)=>a-b);
            if (w < 18) return 0;
            if (w >= 42) return EFW_DATA[42];
            for(let i=0; i<keys.length-1; i++){
                if(w >= keys[i] && w < keys[i+1]){
                    let t = (w - keys[i]) / (keys[i+1] - keys[i]);
                    return EFW_DATA[keys[i]] + t * (EFW_DATA[keys[i+1]] - EFW_DATA[keys[i]]);
                }
            }
        };

        // --- 患者クラス ---
        class Patient {
            constructor(mode) {
                this.mode = mode;
                this.week = 8;
                this.age = 22 + Math.floor(Math.random()*18) + (mode === 'High-Risk' ? 5 : 0);
                this.bmi = 18 + Math.random()*8 + (mode === 'High-Risk' ? 4 : 0);
                this.twin = (mode === 'High-Risk' && Math.random() < 0.35);
                this.wt0 = 45 + Math.random()*25;
                this.wt = this.wt0;
                this.bp = 108 + Math.random()*12;
                this.cl = 40.0;
                this.pf = 0.9 + Math.random()*0.2;
                this.pf2 = 0.9 + Math.random()*0.2;
                this.hdp = false; this.gdm = false; this.gbs = false;
                this.prev_cs = Math.random() < 0.2;
                this.fp = Math.random() < 0.1 ? 1 : 0; // 0: 頭位, 1: 骨盤位
                this.med = false; this.rest = false; this.hosp = false; this.ins = false;
                this.labs = null; this.labW = -1;
                this.needDel = false; this.done = false; this.reason = ""; this.delMode = "";
            }

            simulate(step) {
                this.week += step;
                const w = this.week;
                this.wt += (0.3 + Math.random()*0.3) * step * (this.gdm && !this.ins ? 1.4 : 1.0);
                
                if (w > 20 && !this.hdp) {
                    if (Math.random() < (this.bmi > 25 ? 0.05 : 0.01) * step) this.hdp = true;
                }
                if (this.hdp) {
                    this.bp += (2 + Math.random()*4) * step * (this.med ? 0.6 : 1.0);
                }
                if (w > 20) {
                    this.cl -= (0.5 + Math.random()*1.0) * step * (this.rest ? 0.5 : 1.0);
                }

                this.checkLabs();
                if (this.week >= 41.5) { this.needDel = true; this.reason = "過期妊娠"; }
                if (this.hdp && this.bp > 175) { this.needDel = true; this.reason = "重症HDP(HELLP/子癇切迫)"; }
                if (this.cl < 5 && this.week >= 34) { this.needDel = true; this.reason = "切迫早産からの分娩"; }
                if (this.week >= 37 && Math.random() < 0.1 * step) { this.needDel = true; this.reason = "自然陣痛"; }
            }

            checkLabs() {
                const w = Math.floor(this.week);
                if (w >= 10 && w <= 12 && this.labW < 10) {
                    this.labs = { "Type": "初期", "週数": w, "Hb": (11.5 + Math.random()*2).toFixed(1), "Plt": Math.floor(15 + Math.random()*15) + "万", "随時血糖": 85 + Math.floor(Math.random()*25), "風疹": "HI 32x", "HBsAg": "陰性", "HIV": "陰性", "梅毒": "陰性", "ｸﾗﾐｼﾞｱ": "陰性" };
                    this.labW = w;
                } else if (w >= 24 && w <= 26 && this.labW < 24) {
                    this.gdm = Math.random() < 0.1;
                    this.labs = { "Type": "中期", "週数": w, "50gGCT": this.gdm ? "152 (異常)" : "98 (正常)", "Hb": (10.5 + Math.random()*2).toFixed(1) };
                    this.labW = w;
                } else if (w >= 34 && w <= 36 && this.labW < 34) {
                    this.gbs = Math.random() < 0.15;
                    this.labs = { "Type": "後期", "週数": w, "GBS": this.gbs ? "陽性" : "陰性", "Hb": (10.0 + Math.random()*2).toFixed(1) };
                    this.labW = w;
                } else if (this.hosp && (w - this.labW >= 1)) {
                    this.labs = { "Type": "入院中", "週数": w, "WBC": Math.floor(7000+Math.random()*6000), "CRP": (Math.random()*3).toFixed(2), "Hb": (9.5+Math.random()*2).toFixed(1), "Plt": Math.floor(15+Math.random()*15) + "万" };
                    this.labW = w;
                }
            }
        }

        // --- ゲーム制御 ---
        let p;
        let selected = new Set();

        function initGame(mode) {
            p = new Patient(mode);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            updateUI();
        }

        function updateUI() {
            const w = Math.floor(p.week);
            const interval = p.hosp ? "1週" : (w < 24 ? "4週" : (w < 36 ? "2週" : "1週"));
            document.getElementById('header-area').innerText = `【${p.mode === 'Standard' ? '一般' : '高度'}】${w}週 - ${p.hosp ? '入院' : '外来'}（${interval}）`;
            
            document.getElementById('s-text').innerText = (p.cl < 20 ? "お腹が張る" : (p.bp > 160 ? "頭が重い、目がチカチカする" : "特になし"));
            
            let o = `BP: ${Math.floor(p.bp)}/${Math.floor(p.bp*0.6)} mmHg\n`;
            o += `体重: ${p.wt.toFixed(1)}kg (+${(p.wt - p.wt0).toFixed(1)}kg)\n`;
            o += `尿蛋白: ${p.hdp ? (p.bp>160 ? '(2+)' : '(1+)') : '(-)'}  尿糖: ${p.gdm ? '(1+)' : '(-)'}\n`;
            o += `CL: ${p.cl.toFixed(1)}mm\n`;
            if (w < 8) o += `GS: ${(p.week*2.5).toFixed(1)}mm`;
            else if (w < 12) o += `CRL: ${((p.week-7)*9 + 5).toFixed(1)}mm`;
            else if (w >= 18) {
                let w1 = Math.floor(getEfw(p.week) * p.pf * (p.gdm && !p.ins ? 1.15 : 1.0));
                if (p.twin) {
                    let w2 = Math.floor(getEfw(p.week) * p.pf2);
                    o += `EFW: F1 ${w1}g / F2 ${w2}g`;
                } else {
                    o += `EFW: ${w1}g`;
                }
            }
            document.getElementById('o-text').innerText = o;

            const labDiv = document.getElementById('lab-area');
            labDiv.innerHTML = "";
            if (p.labs) {
                let h = `<div class="lab-box"><div class="lab-header">┌─ Lab (${p.labs.週数}週: ${p.labs.Type}) ─┐</div>`;
                for(let k in p.labs) {
                    if (k === "Type" || k === "週数") continue;
                    let val = p.labs[k];
                    let isAbn = (k === "Hb" && val < 10.5) || (val.toString().includes("陽性")) || (val.toString().includes("異常")) || (k === "随時血糖" && val >= 100) || (k === "CRP" && val > 0.5) || (k === "Plt" && parseInt(val) < 10);
                    h += `<div class="lab-row ${isAbn ? 'lab-warn' : ''}"><span>${k}:</span> <span>${val}${isAbn ? ' ⚠' : ''}</span></div>`;
                }
                h += `<div>└───────────────┘</div></div>`;
                labDiv.innerHTML = h;
            }

            let probs = [];
            if (p.hdp) probs.push("妊娠高血圧症候群(HDP)");
            if (p.gdm) probs.push("妊娠糖尿病(GDM)" + (p.ins ? "[Ins導入済]" : ""));
            if (p.cl < 25) probs.push("切迫早産");
            if (p.prev_cs) probs.push("既往帝王切開");
            if (p.fp !== 0) probs.push("胎位異常(骨盤位)");
            if (p.twin) probs.push("双胎妊娠");
            document.getElementById('a-text').innerText = probs.join('\n') || "順調";

            // 背景画像の正確なパス指定（ケースセンシティブ）
            let bg = "";
            if (p.hosp) bg = `assets/Inpatient/inpatient_${(w % 2) + 1}.jpg`;
            else bg = `assets/Outpatient/outpatient_${(w % 3) + 1}.jpg`;
            
            // 直接背景にセット（プリロード済みのキャッシュを利用）
            const container = document.getElementById('game-container');
            container.style.backgroundImage = `url('${bg}')`;

            renderButtons();
        }

        function renderButtons() {
            const grid = document.getElementById('btn-grid');
            grid.innerHTML = "";
            selected.clear();
            let opts = p.hosp ? 
                ["安静継続", "塩分制限食", "降圧薬/抑制剤", "NST毎日実施", "入院継続", "分娩決定"] :
                ["妊婦健診", "1週後再診", "2-3日後再診", "自宅安静指示", "鉄剤処方", "管理入院判断"];
            if (p.gdm && !p.ins && p.hosp) opts[1] = "インスリン導入";

            opts.forEach(t => {
                const b = document.createElement('div');
                b.className = "btn"; b.innerText = t;
                b.onclick = () => {
                    if (selected.has(t)) { selected.delete(t); b.classList.remove('selected'); }
                    else { selected.add(t); b.classList.add('selected'); }
                };
                grid.appendChild(b);
            });
        }

        function nextWeek() {
            if (selected.size === 0) return;
            let step = p.hosp ? 1.0 : (p.week < 24 ? 4.0 : (p.week < 36 ? 2.0 : 1.0));
            selected.forEach(t => {
                if (t.includes("1週後")) step = 1.0;
                if (t.includes("2-3日後")) step = 0.5;
                if (t.includes("入院")) p.hosp = true;
                if (t.includes("インスリン")) { p.ins = true; p.hosp = true; }
                if (t.includes("降圧薬") || t.includes("抑制剤")) p.med = true;
                if (t.includes("安静")) p.rest = true;
                if (t.includes("分娩")) { p.needDel = true; p.reason = "分娩方針決定(予定分娩)"; }
            });
            p.simulate(step);
            if (p.needDel) showDeliveryPhase(); else updateUI();
        }

        function showDeliveryPhase() {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('delivery-screen').style.display = 'flex';
            document.getElementById('del-reason-title').innerText = `【${Math.floor(p.week)}週】 理由: ${p.reason}`;
            document.getElementById('game-container').style.backgroundImage = "url('assets/Delivery/delivery.jpg')";
        }

        function executeDelivery(idx) {
            document.getElementById('delivery-screen').style.display = 'none';
            p.done = true;
            let modes = ["経膣分娩", "分娩誘発", "予定帝王切開", "緊急帝王切開", "超緊急帝王切開"];
            p.delMode = modes[idx - 1];
            
            p.err = false;
            p.errMsg = "";
            let cs_ind = p.twin || p.prev_cs || p.fp !== 0;
            if (cs_ind && idx <= 2) { p.err = true; p.errMsg = "適応外の経膣分娩試行（子宮破裂/難産リスク）"; }
            if (p.reason.includes("重症") && idx !== 5) { p.err = true; p.errMsg = "超緊急事態に対する初動遅れ"; }
            
            showOutcome();
        }

        function showOutcome() {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('outcome-screen').style.display = 'flex';
            
            let w1 = Math.floor(getEfw(p.week) * p.pf);
            let weightStr = `${w1}g`;
            if (p.twin) {
                let w2 = Math.floor(getEfw(p.week) * p.pf2);
                weightStr = `F1: ${w1}g / F2: ${w2}g`;
            }
            
            document.getElementById('outcome-desc').innerText = `${Math.floor(p.week)}週 分娩\n理由: ${p.reason}\n方針: ${p.delMode}\n児体重: ${weightStr}\n出血量: ${Math.floor((p.err ? 1200 : 400)+Math.random()*400)}ml`;
            
            if (p.err) {
                document.getElementById('outcome-audit').innerHTML = `<li style="color:#cc0000;">❌ 評価: 不適切<br>理由: ${p.errMsg}<br>Apgar Score: 3/5</li>`;
            } else {
                document.getElementById('outcome-audit').innerHTML = "<li>✅ 評価: 適切<br>ガイドラインに沿った管理でした。<br>Apgar Score: 8/9</li>";
            }
            
            // フォルダ名 "outcume" に合わせる（KKさんの環境のタイポに合わせる）
            let bg = p.err ? "assets/outcume/bad.jpg" : "assets/outcume/delivery_good.jpg";
            document.getElementById('game-container').style.backgroundImage = `url('${bg}')`;
        }

        // 画像プリロード機能 (高速化)
        const ASSETS = [
            'assets/mainmenu/mainmenu.jpg',
            'assets/Outpatient/outpatient_1.jpg', 'assets/Outpatient/outpatient_2.jpg', 'assets/Outpatient/outpatient_3.jpg',
            'assets/Inpatient/inpatient_1.jpg', 'assets/Inpatient/inpatient_2.jpg',
            'assets/Delivery/delivery.jpg',
            'assets/outcume/delivery_good.jpg', 'assets/outcume/bad.jpg'
        ];

        function preloadImages() {
            ASSETS.forEach(path => {
                const img = new Image();
                img.src = path;
            });
        }

        // 初期背景とプリロード開始
        window.onload = () => { 
            document.getElementById('game-container').style.backgroundImage = "url('assets/mainmenu/mainmenu.jpg')";
            preloadImages(); 
        };
    </script>
</body>
</html>
