<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>産科臨床シミュレーター - 読み込み中...</title>
    <script>
        // 端末判定と自動転送のスクリプト
        function redirectByDevice() {
            const ua = navigator.userAgent.toLowerCase();

            // iPhone、またはAndroidのスマホの場合
            if (ua.indexOf('iphone') > -1 || (ua.indexOf('android') > -1 && ua.indexOf('mobile') > -1)) {
                window.location.replace('index_iphone.html');
            }
            // iPadの場合（※最近のiPadはMacと認識されるため、画面のタッチ機能の有無で判定）
            else if (ua.indexOf('ipad') > -1 || (ua.indexOf('macintosh') > -1 && 'ontouchend' in document)) {
                window.location.replace('index_ipad.html');
            }
            // それ以外（MacやWindowsなどのPC）
            else {
                window.location.replace('index_pc.html');
            }
        }

        // ページ読み込み時に実行
        redirectByDevice();
    </script>
</head>

<body style="background-color: #000; color: #fff; text-align: center; margin-top: 20vh; font-family: sans-serif;">
    <p>端末に合わせて最適な画面に移動しています...</p>
</body>

</html>
