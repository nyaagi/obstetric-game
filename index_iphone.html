<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>産科臨床シミュレーター iPhone版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.92); --danger: #cc0000; --info: #0066cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background: #000; position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* 896x504 固定コンテナ */
        #game-container { position: absolute; left: 50%; top: 50%; width: 896px; height: 504px; background-color: #222; background-size: cover; background-position: center; background-repeat: no-repeat; transition: background-image 0.4s ease; transform-origin: center center; }

        /* iPhone UI */
        #game-ui { position: absolute; top: 20px; left: 440px; right: 20px; bottom: 15px; display: none; flex-direction: column; gap: 8px; z-index: 10; }
        #header-area { font-size: 24px; font-weight: 700; color: #000; text-shadow: 0 0 6px rgba(255,255,255,0.8); }
        #soa-panel { background: var(--glass); border-radius: 8px; padding: 10px; flex-grow: 1; display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow-y: auto; }
        .soa-col { flex: 1; display: flex; flex-direction: column; }
        .soa-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; border-left: 4px solid #333; padding-left: 6px; }
        .soa-content { font-size: 14px; line-height: 1.3; white-space: pre-wrap; margin-bottom: 6px; }
        .lab-box { margin-top: 5px; padding: 6px; border: 1px solid #666; border-radius: 4px; background: rgba(255,255,255,0.7); font-size: 13px; }
        .lab-header { color: #666; font-size: 12px; border-bottom: 1px solid #ccc; margin-bottom: 4px; }
        .lab-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .lab-warn { color: var(--danger); font-weight: 700; }
        #action-area { display: flex; gap: 10px; height: 130px; }
        #btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); gap: 6px; flex-grow: 1; }
        .btn { background: white; border: 2px solid #333; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn.selected { background: #222; color: white; border-color: #fff; }
        #confirm-btn { width: 60px; background: #cc0000; color: white; border: 2px solid white; border-radius: 6px; font-size: 16px; font-weight: 700; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 2px; cursor: pointer; }
        
        #menu-screen { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; z-index: 100; }
        .menu-half { flex: 1; display: flex; justify-content: center; align-items: center; }
        .mode-card { background: white; padding: 20px 25px; border-radius: 12px; min-width: 240px; text-align: center; border: 3px solid #333; white-space: nowrap; }
        .mode-card h2 { font-size: 22px; margin-bottom: 8px; }
        .mode-card p { font-size: 13px; margin-bottom: 15px; color: #666; }
        
        #outcome-screen, #delivery-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.95); display: none; padding: 20px; z-index: 200; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="menu-screen">
            <div class="menu-half">
                <div class="mode-card">
                    <h2>一般産科医院</h2>
                    <p>ローリスク中心<br>難易度: ★★☆☆☆</p>
                    <button class="btn" style="width:100%; height:40px;" onclick="initGame('Standard')">勤務開始</button>
                </div>
            </div>
            <div class="menu-half">
                <div class="mode-card" style="border-color: #cc0000;">
                    <h2 style="color:#cc0000;">高度医療センター</h2>
                    <p>ハイリスク妊娠が集約<br>難易度: ★★★★★</p>
                    <button class="btn" style="width:100%; height:40px; background:#cc0000; color:white;" onclick="initGame('High-Risk')">勤務開始</button>
                </div>
            </div>
        </div>

        <div id="game-ui">
            <div id="header-area"></div>
            <div id="soa-panel">
                <div class="soa-col">
                    <div class="soa-title">S：</div>
                    <div id="s-text" class="soa-content"></div>
                    <div class="soa-title">O：</div>
                    <div id="o-text" class="soa-content"></div>
                    <div id="lab-area"></div>
                </div>
                <div class="soa-col">
                    <div class="soa-title">A：</div>
                    <div id="a-text" class="soa-content"></div>
                </div>
            </div>
            <div id="action-area">
                <div id="btn-grid"></div>
                <button id="confirm-btn" onclick="nextWeek()">決定<br>次へ</button>
            </div>
        </div>

        <div id="delivery-screen">
            <h1 style="font-size:36px; text-align:center; margin-bottom:10px;">分娩方針の選択</h1>
            <h2 id="del-reason-title" style="font-size:20px; text-align:center; color:#cc0000; margin-bottom:20px;"></h2>
            <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width: 500px; margin: 0 auto;">
                <button class="btn" style="width:200px; height:50px;" onclick="executeDelivery(1)">経膣分娩試行</button>
                <button class="btn" style="width:200px; height:50px;" onclick="executeDelivery(2)">分娩誘発</button>
                <button class="btn" style="width:200px; height:50px;" onclick="executeDelivery(3)">予定帝王切開</button>
                <button class="btn" style="width:200px; height:50px;" onclick="executeDelivery(4)">緊急帝王切開</button>
                <button class="btn" style="width:410px; height:50px; border-color:#cc0000; color:#cc0000;" onclick="executeDelivery(5)">超緊急帝王切開</button>
            </div>
        </div>
        <div id="outcome-screen">
            <h1 id="outcome-title" style="font-size:36px; text-align:center; margin-bottom:20px;">分娩要約</h1>
            <div style="display:flex; gap:20px; flex-grow:1;">
                <div class="soa-panel" style="flex:1; background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #ddd;">
                    <div class="soa-title">分娩結果</div>
                    <div id="outcome-desc" class="soa-content" style="font-size:18px;"></div>
                </div>
                <div class="soa-panel" style="flex:1; background:#f9f9f9; padding:15px; border-radius:8px; border:1px solid #ddd;">
                    <div class="soa-title">臨床評価</div>
                    <div id="outcome-audit" style="font-size:16px; line-height:1.6;"></div>
                </div>
            </div>
            <button class="btn" style="width:200px; height:50px; margin:20px auto 0;" onclick="location.reload()">次の症例へ</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        function resizeGame() {
            const container = document.getElementById('game-container');
            const scale = Math.min(window.innerWidth / 896, window.innerHeight / 504);
            container.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => setTimeout(resizeGame, 100));
        window.onload = () => { 
            resizeGame();
            document.getElementById('game-container').style.backgroundImage = "url('assets/mainmenu/mainmenu.jpg')";
        };
    </script>
</body>
</html>
