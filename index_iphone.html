<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>産科臨床シミュレーター iPad版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.92); --danger: #cc0000; --info: #0066cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background: #000; position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; touch-action: none; user-select: none; }
        
        /* iPad用 1366x768 固定コンテナ */
        #game-container { position: relative; width: 1366px; height: 768px; background-color: #222; background-size: cover; background-position: center; background-repeat: no-repeat; transform-origin: center center; }

        /* ふきだしの位置調整 */
        #game-ui { position: absolute; top: 35px; left: 680px; right: 40px; bottom: 30px; display: none; flex-direction: column; gap: 15px; z-index: 10; }
        
        #header-area { font-size: 34px; font-weight: 700; color: #000; }
        #soa-panel { background: var(--glass); border-radius: 10px; padding: 15px; flex-grow: 1; display: flex; gap: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); overflow-y: auto; }
        .soa-col { flex: 1; display: flex; flex-direction: column; }
        .soa-title { font-size: 26px; font-weight: 700; margin-bottom: 4px; border-left: 6px solid #333; padding-left: 10px; }
        .soa-content { font-size: 22px; line-height: 1.35; white-space: pre-wrap; margin-bottom: 10px; }
        .lab-box { margin-top: 8px; padding: 10px; border: 2px solid #666; border-radius: 6px; background: rgba(255,255,255,0.7); font-size: 20px; }
        .lab-header { color: #666; font-size: 18px; border-bottom: 1px solid #ccc; margin-bottom: 6px; }
        .lab-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .lab-warn { color: var(--danger); font-weight: 700; }

        #action-area { display: flex; gap: 15px; height: 200px; }
        #btn-grid { display: grid; grid-template-columns: repeat(2, 230px); grid-template-rows: repeat(3, 1fr); gap: 10px 15px; }
        .btn { background: white; border: 2px solid #333; border-radius: 8px; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn.selected { background: #222; color: white; border-color: #fff; }
        #confirm-btn { width: 100px; background: #cc0000; color: white; border: 2px solid white; border-radius: 8px; font-size: 24px; font-weight: 700; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 4px; cursor: pointer; }

        #menu-screen { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; z-index: 100; }
        .menu-half { flex: 1; display: flex; justify-content: center; align-items: center; }
        .mode-card { background: white; padding: 30px 40px; border-radius: 16px; min-width: 360px; text-align: center; border: 4px solid #333; white-space: nowrap; }
        .mode-card h2 { font-size: 32px; margin-bottom: 10px; }
        .mode-card p { font-size: 18px; margin-bottom: 20px; color: #666; }

        #outcome-screen, #delivery-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.95); display: none; padding: 40px; z-index: 200; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>
    <div id="game-container">
        </div>
    <script src="game.js"></script>
    <script>
    function resizeGame() {
        const container = document.getElementById('game-container');
        // ★以下の数値（1920と1080）は、PC/iPad/iPhoneそれぞれのHTMLに合わせて変更してください
        const scale = Math.min(window.innerWidth / 896, window.innerHeight / 504);
            container.style.transform = `scale(${scale})`;
        }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('orientationchange', () => setTimeout(resizeGame, 100));

    window.onload = () => {
        resizeGame();
        document.getElementById('game-container').style.backgroundImage = "url('assets/mainmenu/mainmenu.jpg')";
    };
</script>
</body>

</html>
