<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>産科臨床シミュレーター iPhone版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.92); --danger: #cc0000; --info: #0066cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background: #000; position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; touch-action: none; user-select: none; }
        
        /* iPhone用 896x504 固定コンテナ */
        #game-container { position: absolute; left: 50%; top: 50%; width: 896px; height: 504px; background-color: #222; background-size: cover; background-position: center; background-repeat: no-repeat; transform-origin: center center; }

        /* iPhone用にふきだしの左端(440px)から右端までエリアを最大限広げる */
        #game-ui { position: absolute; top: 20px; left: 440px; right: 20px; bottom: 15px; display: none; flex-direction: column; gap: 8px; z-index: 10; }
        
        #header-area { font-size: 24px; font-weight: 700; color: #000; }
        #soa-panel { background: var(--glass); border-radius: 8px; padding: 10px; flex-grow: 1; display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow-y: auto; }
        .soa-col { flex: 1; display: flex; flex-direction: column; }
        .soa-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; border-left: 4px solid #333; padding-left: 6px; }
        .soa-content { font-size: 14px; line-height: 1.3; white-space: pre-wrap; margin-bottom: 6px; }
        .lab-box { margin-top: 5px; padding: 6px; border: 1px solid #666; border-radius: 4px; background: rgba(255,255,255,0.7); font-size: 13px; }
        .lab-header { color: #666; font-size: 12px; border-bottom: 1px solid #ccc; margin-bottom: 4px; }
        .lab-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .lab-warn { color: var(--danger); font-weight: 700; }

        #action-area { display: flex; gap: 10px; height: 130px; }
        #btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); gap: 6px; flex-grow: 1; }
        .btn { background: white; border: 2px solid #333; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn.selected { background: #222; color: white; border-color: #fff; }
        #confirm-btn { width: 60px; background: #cc0000; color: white; border: 2px solid white; border-radius: 6px; font-size: 16px; font-weight: 700; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 2px; cursor: pointer; }

        #menu-screen { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; z-index: 100; }
        .menu-half { flex: 1; display: flex; justify-content: center; align-items: center; }
        .mode-card { background: white; padding: 20px 25px; border-radius: 12px; min-width: 240px; text-align: center; border: 3px solid #333; white-space: nowrap; }
        .mode-card h2 { font-size: 22px; margin-bottom: 8px; }
        .mode-card p { font-size: 13px; margin-bottom: 15px; color: #666; }

        #outcome-screen, #delivery-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.95); display: none; padding: 20px; z-index: 200; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>
    <div id="game-container">
        </div>
    <script>
        function resizeGame() {
            const container = document.getElementById('game-container');
            const scale = Math.min(window.innerWidth / 896, window.innerHeight / 504);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => setTimeout(resizeGame, 100));

        // ★★★ ここに共通のゲームロジックを貼り付けてください ★★★
        window.onload = () => { 
            resizeGame();
            document.getElementById('game-container').style.backgroundImage = "url('assets/mainmenu/mainmenu.jpg')";
        };
    </script>
</body>
</html>
