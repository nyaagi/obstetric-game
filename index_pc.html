<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>産科臨床シミュレーター PC版</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.92);
            --danger: #cc0000;
            --info: #0066cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* PC用 1920x1080 固定コンテナ */
        #game-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            background-color: #222;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform-origin: center center;
        }

        /* ふきだしの位置（右半分）に合わせたUIエリア */
        #game-ui {
            position: absolute;
            top: 50px;
            left: 960px;
            right: 60px;
            bottom: 40px;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        #header-area {
            font-size: 48px;
            font-weight: 700;
            color: #000;
        }

        #soa-panel {
            background: var(--glass);
            border-radius: 12px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            gap: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
        }

        .soa-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .soa-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #000;
            border-left: 8px solid #333;
            padding-left: 12px;
        }

        .soa-content {
            font-size: 32px;
            line-height: 1.35;
            white-space: pre-wrap;
            color: #111;
            margin-bottom: 15px;
        }

        .lab-box {
            margin-top: 10px;
            padding: 15px;
            border: 2px solid #666;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            font-size: 28px;
        }

        .lab-header {
            color: #666;
            font-size: 24px;
            border-bottom: 1px solid #ccc;
            margin-bottom: 8px;
        }

        .lab-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .lab-warn {
            color: var(--danger);
            font-weight: 700;
        }

        #action-area {
            display: flex;
            gap: 20px;
            height: 280px;
        }

        #btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 320px);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px 20px;
        }

        .btn {
            background: white;
            border: 3px solid #333;
            border-radius: 12px;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn.selected {
            background: #222;
            color: white;
            border-color: #fff;
        }

        #confirm-btn {
            width: 140px;
            background: #cc0000;
            color: white;
            border: 3px solid white;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 700;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 6px;
            cursor: pointer;
        }

        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 100;
        }

        .menu-half {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mode-card {
            background: white;
            padding: 40px 50px;
            border-radius: 20px;
            min-width: 480px;
            text-align: center;
            border: 5px solid #333;
            white-space: nowrap;
        }

        .mode-card h2 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .mode-card p {
            font-size: 24px;
            margin-bottom: 30px;
            color: #666;
        }

        #outcome-screen,
        #delivery-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            padding: 60px;
            z-index: 200;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="game-container">
    </div>
    <script src="game.js"></script>
    <script>
        function resizeGame() {
            const container = document.getElementById('game-container');
            // ★以下の数値（1920と1080）は、PC/iPad/iPhoneそれぞれのHTMLに合わせて変更してください
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', () => setTimeout(resizeGame, 100));

        window.onload = () => {
            resizeGame();
            document.getElementById('game-container').style.backgroundImage = "url('assets/mainmenu/mainmenu.jpg')";
        };
    </script>
</body>

</html>
